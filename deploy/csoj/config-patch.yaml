# CSOJ Configuration Overlay for hpc101-platform
#
# Validated against CSOJ config struct: vendor/csoj/internal/config/config.go
# Key YAML tags: cluster[].node (singular), storage.database (nested),
# logger, contests_root.
#
# CSOJ is ZERO-CODE-CHANGE. Only config.yaml is modified.
# DockerManager (internal/judger/docker.go) uses github.com/docker/docker/client
# With client.WithHost(cfg.Host), accepting any docker-compatible endpoint.
# Pointing it at podman-runtime TCP service reuses it unchanged.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: csoj-config
  namespace: hpc101-platform
data:
  config.yaml: |
    # === hpc101-platform CSOJ Configuration ===
    # Zero-change integration: CSOJ code is unmodified.
    # DockerConfig.Host is the sole reuse seam.

    listen: ":8080"

    admin:
      enabled: true
      listen: ":8081"

    logger:
      level: "debug"
      file: ""

    storage:
      user_avatar: "data/avatars"
      submission_content: "data/submissions"
      database: "data/csoj.db"
      submission_log: "data/logs"

    auth:
      jwt:
        # WARNING: JWT secret MUST be injected from a k8s Secret at deploy time.
      # Do NOT use a literal secret here. The deploy pipeline (or a k8s init
      # container using envsubst) replaces this placeholder with the actual
      # secret value from a k8s Secret (e.g., mounted at /etc/csoj/secrets/jwt).
      # CSOJ config.Load is a plain YAML unmarshal — no env-var expansion.
      secret: "${CSOJ_JWT_SECRET}"
        expire_hours: 744
      local:
        enabled: true
      gitlab:
        app: ""
        url: ""
        client_id: ""
        client_secret: ""
        redirect_uri: ""
        frontend_callback_url: ""

    cors:
      allowed_origins:
        - "http://localhost:8080"

    links: []

    # === Judger cluster: single node = podman runtime ===
    # Cluster[].Node[].Docker.Host is the KEY reuse seam.
    # CSOJ's DockerManager uses client.WithHost(cfg.Host).
    cluster:
      - name: "hpc101-runtime"
        node:
          - name: "podman-0"
            cpu: 4
            memory: 8192
            docker:
              host: "tcp://podman-runtime.hpc101-runtime.svc.cluster.local:2375"
              tls_verify: false
              ca_cert: ""
              cert: ""
              key: ""

    contests_root: "contests"
