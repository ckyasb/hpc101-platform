# Podman Runtime Deployment — Restricted PSA Compliant (Primary Path per AC-1.1)
#
# Rootless podman exposing a docker-compatible TCP endpoint inside the cluster.
# Consumed by: platform controller + CSOJ (via DockerConfig.Host).
#
# AC-1.1 primary path: runs under restricted Pod Security Admission.
#   - no privileged:true
#   - no hostPath volumes (cgroup access via pod's own cgroup namespace)
#   - runAsNonRoot: true
#   - allowPrivilegeEscalation: false
#   - capabilities.drop: [ALL]
#   - seccompProfile: RuntimeDefault
#
# Known tension: rootless podman inside a container under restricted PSA is
# novel (exploratory, no repo precedent). This manifest is the PRIMARY-PATH
# attempt. If cgroup/resource enforcement fails under these constraints,
# escalate to DEC-1: dedicated out-of-cluster podman judge node via TCP
# (CSOJ natively supports tcp://host:2375, zero code change).
---
apiVersion: v1
kind: Namespace
metadata:
  name: hpc101-runtime
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
    app.kubernetes.io/part-of: hpc101-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: podman-runtime
  namespace: hpc101-runtime
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: podman-runtime
  namespace: hpc101-runtime
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: podman-runtime
  namespace: hpc101-runtime
subjects:
  - kind: ServiceAccount
    name: podman-runtime
    namespace: hpc101-runtime
roleRef:
  kind: Role
  name: podman-runtime
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: podman-containers-conf
  namespace: hpc101-runtime
data:
  containers.conf: |
    # Daemon-level hardening for ALL containers created by this runtime.
    # Per plan AC-8: judge containers inherit CapDrop=ALL, no-new-privileges,
    # and the default seccomp profile without any CSOJ code changes.
    [containers]
    # Drop all default Linux capabilities from spawned containers
    default_capabilities = []
    add_capabilities = []
    # Prevent spawned containers from gaining new privileges via setuid/setgid
    no_new_privileges = true
    # Apply the standard seccomp profile from the container image
    seccomp_profile = "/usr/share/containers/seccomp.json"
    # Environment variables injected by default
    env = []
    # Log driver for log collection
    log_driver = "k8s-file"

    [engine]
    runtime = "crun"
    infra_image = ""

    [network]
    network_backend = "cni"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: podman-registries-conf
  namespace: hpc101-runtime
data:
  registries.conf: |
    [registries.search]
    registries = ["docker.io", "quay.io"]
---
apiVersion: v1
kind: Service
metadata:
  name: podman-runtime
  namespace: hpc101-runtime
  labels:
    app: podman-runtime
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: docker-api
      port: 2375
      targetPort: 2375
      protocol: TCP
  selector:
    app: podman-runtime
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: podman-runtime
  namespace: hpc101-runtime
  labels:
    app: podman-runtime
    app.kubernetes.io/part-of: hpc101-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: podman-runtime
  template:
    metadata:
      labels:
        app: podman-runtime
    spec:
      serviceAccountName: podman-runtime
      nodeSelector:
        kubernetes.io/os: linux
      securityContext:
        # Pod-level: no privilege, restricted PSA baseline
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: podman
          image: quay.io/podman/stable:v5.3
          command:
            - podman
            - system
            - service
            - --time=0
            - tcp://0.0.0.0:2375
          env:
            - name: STORAGE_DRIVER
              value: overlay
            - name: STORAGE_OPTS
              value: overlay.mount_program=/usr/bin/fuse-overlayfs
            - name: BUILDAH_ISOLATION
              value: chroot
          ports:
            - containerPort: 2375
              name: docker-api
              protocol: TCP
          volumeMounts:
            - name: containers-conf
              mountPath: /etc/containers/containers.conf
              subPath: containers.conf
            - name: registries-conf
              mountPath: /etc/containers/registries.conf
              subPath: registries.conf
            - name: podman-data
              mountPath: /var/lib/containers
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 165536
            runAsGroup: 165536
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "8Gi"
          livenessProbe:
            tcpSocket:
              port: 2375
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 2375
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: containers-conf
          configMap:
            name: podman-containers-conf
        - name: registries-conf
          configMap:
            name: podman-registries-conf
        - name: podman-data
          emptyDir:
            sizeLimit: 50Gi
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
---
# NetworkPolicy: allow CSOJ and controller across namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hpc101-platform
  namespace: hpc101-runtime
spec:
  podSelector:
    matchLabels:
      app: podman-runtime
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: hpc101-platform
          podSelector:
            matchLabels:
              app: csoj
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: hpc101-platform
          podSelector:
            matchLabels:
              app: controller
      ports:
        - port: 2375
          protocol: TCP
