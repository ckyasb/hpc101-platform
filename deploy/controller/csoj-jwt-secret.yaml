# CSOJ JWT Secret — supplies the controller with credentials to call CSOJ's API.
# Create with: kubectl create secret generic csoj-jwt --from-literal=token=<jwt> -n hpc101-platform
# The JWT must belong to a CSOJ user registered for the target contest.
apiVersion: v1
kind: Secret
metadata:
  name: csoj-jwt
  namespace: hpc101-platform
  labels:
    app.kubernetes.io/part-of: hpc101-platform
type: Opaque
stringData:
  token: "REPLACE_WITH_CSOJ_JWT"
