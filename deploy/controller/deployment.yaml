# Platform Controller Deployment for hpc101-platform
# Serves the lease lookup API consumed by the bastion's
# AuthorizedPrincipalsCommand (/api/v1/leases?principal=).
---
apiVersion: v1
kind: Namespace
metadata:
  name: hpc101-platform
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    app.kubernetes.io/part-of: hpc101-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: controller
  namespace: hpc101-platform
---
apiVersion: v1
kind: Service
metadata:
  name: controller
  namespace: hpc101-platform
  labels:
    app: controller
    app.kubernetes.io/part-of: hpc101-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: hpc101-platform
  labels:
    app: controller
    app.kubernetes.io/part-of: hpc101-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controller
  template:
    metadata:
      labels:
        app: controller
        app.kubernetes.io/part-of: hpc101-platform
    spec:
      serviceAccountName: controller
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: hpc101-platform/controller:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
          env:
            - name: HPC101_RUNTIME_ENDPOINT
              value: "tcp://podman-runtime.hpc101-runtime.svc.cluster.local:2375"
            - name: HPC101_BASTION_MGMT_URL
              value: "http://bastion.hpc101-bastion.svc.cluster.local:8081"
            - name: CSOJ_API_URL
              value: "http://csoj.hpc101-platform.svc.cluster.local:8080/api/v1"
            - name: CSOJ_JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: csoj-jwt
                  key: token
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
