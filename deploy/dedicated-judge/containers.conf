# DEC-1 Dedicated Judge Node — Podman containers.conf
#
# Hardening profile matching AC-8 requirements. Applied at daemon level
# so all containers created through this runtime (including CSOJ judge
# containers) inherit these settings automatically.
#
# Place at: /etc/containers/containers.conf

[containers]
# Drop all default Linux capabilities
default_capabilities = []

# No additional capabilities
add_capabilities = []

# Prevent setuid binaries from gaining privileges
no_new_privileges = true

# Use default seccomp filter (mode 2)
seccomp_profile = "/usr/share/containers/seccomp.json"

# Use private /dev
devices = []

# Restrict IPC
ipcns = "private"

# Default network mode
network = "bridge"

# Log driver
log_driver = "journald"

[engine]
# Runtime table
runtime = "crun"

# Enable docker-compatible API
[engine.service]
enabled = true
