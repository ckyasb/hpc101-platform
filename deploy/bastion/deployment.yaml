# SSH Bastion Deployment for hpc101-platform
#
# Single bastion sshd authenticates students via platform-CA-signed
# short-lived SSH certificates and forwards (ssh -J / ProxyJump) to
# the student's allocated container sshd.
#
# Certificates carry the critical option:
#   force-command="/bin/false" — no interactive shell on bastion
#
# Container target binding is enforced by AuthorizedPrincipalsCommand
# (permitopen is valid as an sshd/authorized_keys option, not a cert option).
#
# Per plan AC-2: bastion has no shell, no raw pubkey, no gateway-ports,
# cert-only auth via TrustedUserCAKeys.
# VSCode Remote-SSH works with ProxyJump configured in ~/.ssh/config.
---
apiVersion: v1
kind: Namespace
metadata:
  name: hpc101-bastion
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    app.kubernetes.io/part-of: hpc101-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bastion
  namespace: hpc101-bastion
---
apiVersion: v1
kind: Service
metadata:
  name: bastion
  namespace: hpc101-bastion
  labels:
    app: bastion
    app.kubernetes.io/part-of: hpc101-platform
spec:
  type: ClusterIP
  ports:
    - name: ssh
      port: 2222
      targetPort: 2222
      protocol: TCP
  selector:
    app: bastion
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bastion
  namespace: hpc101-bastion
  labels:
    app: bastion
    app.kubernetes.io/part-of: hpc101-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bastion
  template:
    metadata:
      labels:
        app: bastion
        app.kubernetes.io/part-of: hpc101-platform
    spec:
      serviceAccountName: bastion
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
      initContainers:
        - name: prepare-host-key
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /secret/ssh_host_ed25519_key /keys/ssh_host_ed25519_key
              chmod 0600 /keys/ssh_host_ed25519_key
              # No chown: init runs as UID 1000 so files are 1000-owned
          volumeMounts:
            - name: ssh-host-key-secret
              mountPath: /secret
              readOnly: true
            - name: ssh-host-key
              mountPath: /keys
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: sshd
          image: hpc101-platform/bastion:latest
          ports:
            - containerPort: 2222
              name: ssh
              protocol: TCP
          volumeMounts:
            - name: sshd-config
              mountPath: /etc/ssh/sshd_config
              subPath: sshd_config
              readOnly: true
            - name: ca-public-key
              mountPath: /etc/ssh/ca.pub
              subPath: ca.pub
              readOnly: true
            - name: ssh-host-key
              mountPath: /etc/ssh/ssh_host_ed25519_key
              subPath: ssh_host_ed25519_key
              readOnly: true
            - name: principals-script
              mountPath: /usr/local/bin/bastion-principals
              subPath: bastion-principals.sh
              readOnly: true
            - name: run
              mountPath: /run/sshd
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
          env:
            - name: HPC101_CONTROLLER_URL
              value: "http://controller.hpc101-platform.svc.cluster.local:8080"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 2222
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 2222
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: sshd-config
          configMap:
            name: bastion-sshd-config
        - name: ca-public-key
          secret:
            secretName: bastion-ca-keys
            items:
              - key: ca.pub
                path: ca.pub
        - name: ssh-host-key-secret
          secret:
            secretName: bastion-host-key
            defaultMode: 0440
            items:
              - key: ssh_host_ed25519_key
                path: ssh_host_ed25519_key
        - name: ssh-host-key
          emptyDir: {}
        - name: principals-script
          configMap:
            name: bastion-principals-script
            defaultMode: 0555
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bastion-sshd-config
  namespace: hpc101-bastion
data:
  sshd_config: |
    Port 2222
    Protocol 2
    HostKey /etc/ssh/ssh_host_ed25519_key
    TrustedUserCAKeys /etc/ssh/ca.pub
    PubkeyAuthentication yes
    PasswordAuthentication no
    ChallengeResponseAuthentication no
    AuthorizedKeysFile none
    AuthorizedPrincipalsCommand /usr/local/bin/bastion-principals %i
    AuthorizedPrincipalsCommandUser nobody
    LogLevel VERBOSE
    AllowTcpForwarding yes
    GatewayPorts no
    PermitOpen none
    X11Forwarding no
    AllowAgentForwarding no
    PermitTTY no
    ForceCommand /bin/false
    MaxSessions 10
    ClientAliveInterval 60
    ClientAliveCountMax 3
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bastion-principals-script
  namespace: hpc101-bastion
data:
  bastion-principals.sh: |
    #!/bin/sh
    # AuthorizedPrincipalsCommand for hpc101-platform.
    # Called by sshd with %i = certificate KeyId (student principal).
    # Returns: permitopen="host:port" principal  (or nothing to reject).
    PRINCIPAL="$1"
    if ! echo "$PRINCIPAL" | grep -qE '^[a-zA-Z0-9_-]{1,64}$'; then exit 0; fi
    CTRL="${HPC101_CONTROLLER_URL:-http://controller.hpc101-platform.svc.cluster.local:8080}"
    LEASE=$(curl -s --max-time 5 "${CTRL}/api/v1/leases?principal=${PRINCIPAL}" 2>/dev/null || echo "")
    if [ -z "$LEASE" ]; then exit 0; fi
    HOST=$(echo "$LEASE" | jq -r '.container_host // ""' 2>/dev/null)
    PORT=$(echo "$LEASE" | jq -r '.container_port // ""' 2>/dev/null)
    STATE=$(echo "$LEASE" | jq -r '.state // ""' 2>/dev/null)
    if [ "$STATE" != "Active" ]; then exit 0; fi
    if ! echo "$HOST" | grep -qE '^[a-zA-Z0-9._-]+$'; then exit 0; fi
    if ! echo "$PORT" | grep -qE '^[1-9][0-9]{0,4}$'; then exit 0; fi
    if [ "$PORT" -gt 65535 ] 2>/dev/null; then exit 0; fi
    echo "permitopen=\"${HOST}:${PORT}\" ${PRINCIPAL}"
    exit 0
